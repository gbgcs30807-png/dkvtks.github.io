<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>앞산공원</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* [개선] 부드러운 전체 화면 슬라이딩 전환을 위한 기본 초기화 */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #000000;
            /* 원페이지 자연스러운 전환을 위해 기본 스크롤바 숨김 */
            overflow: hidden;
        }

        /* 두 개의 화면(메인, VR)을 통째로 움직여줄 컨테이너 */
        .wrapper {
            width: 100%;
            height: 200vh; /* 100vh짜리 섹션 2개이므로 총 200vh */
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        /* 각 섹션 공통 스타일 (화면 하나를 가득 채움) */
        .section {
            width: 100vw;
            height: 100vh;
            position: relative;
            box-sizing: border-box;
        }

        /* ==================== 1번 섹션: 메인 화면 스타일 ==================== */
        .background-container {
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), url('image1.jpg') center/cover no-repeat;
        }

        header {
            position: absolute; top: 0; right: 0; width: 100%; padding: 30px 60px;
            box-sizing: border-box; display: flex; justify-content: flex-end; z-index: 10;
            background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px);
        }

        header nav a {
            color: #ffffff; text-decoration: none; margin-left: 35px;
            font-size: 16px; font-weight: 500; transition: color 0.3s;
        }
        header nav a:hover { color: #ddd; }

        .main-title {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: #ffffff; text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.6); width: 100%;
        }

        .subtitle { font-size: 28px; font-weight: 300; margin-bottom: 15px; letter-spacing: 2px; }
        .title { font-size: 110px; font-weight: 900; margin: 0; letter-spacing: -2px; line-height: 1; }

        .bottom-wave { position: absolute; bottom: 0; left: 0; width: 100%; height: 200px; z-index: 1; }

        /* 부드럽게 통통 튀는 스크롤 안내 문구 */
        .scroll-guide {
            position: absolute; bottom: 85px; width: 100%; text-align: center;
            color: #333333; font-size: 14px; font-weight: 700; z-index: 2;
            animation: bounce 2s infinite; cursor: pointer;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
            60% { transform: translateY(-3px); }
        }

        .footer-info {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: #222222; font-size: 15px; font-weight: 500; z-index: 2;
        }

        .fab-button {
            position: absolute; bottom: 120px; right: 60px; width: 80px; height: 80px;
            background-color: #ffffff; border-radius: 50%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-decoration: none; color: #000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); z-index: 10; cursor: pointer;
        }

        .butterfly { position: absolute; z-index: 5; }
        .bt-1 { bottom: 90px; right: 160px; font-size: 45px; transform: rotate(-15deg); }
