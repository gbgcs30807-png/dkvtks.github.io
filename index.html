<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹페이지 메인</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 기본 여백 제거 및 폰트 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 전체 배경 설정 */
        .background-wrap {
            width: 100vw;
            height: 100vh;
            /* image1.jpg를 배경으로 설정 */
            background-image: url('image1.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        /* 상단 네비게이션 (헤더) 영역 */
        header {
            width: 100%;
            padding: 25px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end; /* 메뉴를 오른쪽으로 정렬 */
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 메뉴 리스트 스타일 */
        nav {
            display: flex;
            gap: 15px; /* 메뉴 사이 간격 */
        }

        /* 개별 메뉴 링크 스타일 */
        nav a {
            text-decoration: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 8px; /* 띄지 모서리를 둥글게 */
            /* 기본 상태에서도 글자가 약간 보이도록 텍스트 그림자 추가 */
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.7); 
            transition: all 0.3s ease; /* 부드러운 전환 효과 */
        }

        /* 💡 마우스를 올렸을 때 (Hover) 띄지 효과 */
        nav a:hover {
            background-color: rgba(0, 0, 0, 0.65); /* 반투명한 검은색 배경 추가 */
            text-shadow: none; /* 배경이 생기면 그림자는 제거하여 깔끔하게 처리 */
        }
    </style>
</head>
<body>

    <div class="background-wrap">
        <header>
            <nav>
                <a href="#">명소</a>
                <a href="#">행사안내</a>
                <a href="#">편의시설</a>
                <a href="#">공지사항</a>
                <a href="#">찾아오시는길</a>
            </nav>
        </header>
    </div>

</body>
</html>
