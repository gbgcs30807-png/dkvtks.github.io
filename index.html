<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 홈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('image1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 30px 50px;
        }

        nav ul {
            display: flex;
            justify-content: flex-end;
            list-style: none;
            gap: 30px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        
        /* 현재 페이지 또는 강조하고 싶은 메뉴 스타일 */
        nav ul li a.active {
            color: #ffeb3b; 
        }

        /* 메인 화면 중앙 콘텐츠 */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .main-title {
            font-size: 50px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        .main-subtitle {
            font-size: 20px;
            margin-bottom: 40px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* 문의하기 페이지로 이동하는 버튼 */
        .btn-inquiry {
            display: inline-block;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .btn-inquiry:hover {
            background-color: #fff;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            nav ul {
                justify-content: center;
                flex-wrap: wrap;
                gap: 15px;
            }
            .main-title { font-size: 35px; }
            .main-subtitle { font-size: 16px; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="index.html">홈</a></li>
                <li><a href="#">명소</a></li>
                <li><a href="#">행사안내</a></li>
                <li><a href="#">편의시설</a></li>
                <li><a href="#">공지사항</a></li>
                <li><a href="#">찾아오시는길</a></li>
                <li><a href="inquiry.html">문의하기</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="main-title">자연과 함께하는 힐링 공간</h1>
        <p class="main-subtitle">방문해주셔서 감사합니다. 궁금하신 점은 언제든 물어보세요.</p>
        <a href="inquiry.html" class="btn-inquiry">문의하기 바로가기</a>
    </main>

</body>
</html>
