<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>앞산공원</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* 기본 초기화 */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #1a1a1a;
            overflow: hidden;
            /* 드래그/줌 시 텍스트 파란색 블록 지정 방지 */
            user-select: none;
            -webkit-user-select: none;
        }

        /* 전체 섹션을 움직이는 컨테이너 */
        .wrapper {
            width: 100%;
            height: 200vh;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        /* 각 섹션 공통 크기 */
        .section {
            width: 100vw;
            height: 100vh;
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* ==================== 1번 섹션: 메인 화면 스타일 ==================== */
        .background-container {
            background-color: #2f3e46; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('image1.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        header {
            position: absolute; top: 0; right: 0; width: 100%; padding: 30px 60px;
            box-sizing: border-box; display: flex; justify-content: flex-end; z-index: 10;
            background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px);
        }

        header nav a {
            color: #ffffff; text-decoration: none; margin-left: 35px;
            font-size: 16px; font-weight: 500; transition: color 0.3s;
        }
        header nav a:hover { color: #ddd; }

        .main-title {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: #ffffff; text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.6); width: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .subtitle { font-size: 28px; font-weight: 300; margin-bottom: 15px; letter-spacing: 2px; }
        .title { font-size: 110px; font-weight: 900; margin: 0; letter-spacing: -2px; line-height: 1; }

        .bottom-wave { position: absolute; bottom: 0; left: 0; width: 100%; height: 200px; z-index: 1; pointer-events: none; }

        .scroll-guide {
            position: absolute; bottom: 85px; width: 100%; text-align: center;
            color: #ffffff; font-size: 14px; font-weight: 700; z-index: 2;
            animation: bounce 2s infinite; cursor: pointer;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
            60% { transform: translateY(-3px); }
        }
