<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>앞산공원</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }

        /* 배경 설정 */
        .main-bg {
            width: 100vw; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('image1.jpg') center/cover no-repeat;
            position: relative; color: white;
        }

        /* 상단 네비게이션 */
        header { position: absolute; top: 0; width: 100%; padding: 30px 60px; display: flex; justify-content: flex-end; z-index: 10; }
        nav a { 
            color: white; text-decoration: none; margin-left: 40px; font-weight: 500; 
            padding: 10px 20px; border-radius: 20px; transition: 0.3s;
        }
        nav a:hover { background-color: rgba(255,255,255,0.3); }

        /* 중앙 텍스트 */
        .hero { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .sub-title { font-size: 24px; font-weight: 300; margin-bottom: 10px; }
        .main-title { font-size: 90px; font-weight: 900; }

        /* 하단 영역 */
        .bottom-footer {
            position: absolute; bottom: 0; width: 100%; height: 150px;
            background: rgba(255,255,255,0.8);
            border-top-left-radius: 50% 100px; border-top-right-radius: 50% 100px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #333; font-weight: 600;
        }

        /* 우측 하단 버튼 */
        .contact-btn {
            position: absolute; bottom: 100px; right: 80px; width: 80px; height: 80px;
            background: white; border-radius: 50%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: black; font-size: 12px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="main-bg">
        <header>
            <nav>
                <a href="#">명소</a>
                <a href="#">행사안내</a>
                <a href="#">편의시설</a>
                <a href="#">공지사항</a>
                <a href="#">찾아오시는길</a>
            </nav>
        </header>

        <div class="hero">
            <div class="sub-title">도심 속 자연</div>
            <div class="main-title">앞산공원</div>
        </div>

        <div class="contact-btn">
            <span>🎧</span>
            <span>문의하기</span>
        </div>

        <div class="bottom-footer">
            <p>고객센터 053-803-7420</p>
            <p>운영시간 09:00 ~ 18:00</p>
        </div>
    </div>

</body>
</html>
