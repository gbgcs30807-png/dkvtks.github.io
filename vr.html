<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>앞산 풍경 VR</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Noto Sans KR', sans-serif; overflow: hidden; 
            background-color: #000000;
        }

        body {
            opacity: 0;
            transform: translateY(100vh); /* 아래쪽 대기 상태 */
        }

        .background-container {
            width: 100vw; height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('image1.jpg') center/cover no-repeat;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        header {
            position: absolute; top: 0; right: 0; width: 100%; padding: 30px 60px;
            box-sizing: border-box; display: flex; justify-content: flex-end; z-index: 10;
            background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px);
        }

        header nav a { color: #ffffff; text-decoration: none; margin-left: 35px; font-size: 16px; font-weight: 500; transition: color 0.3s; }
        header nav a:hover { color: #ddd; }

        .vr-container { text-align: center; color: #ffffff; width: 85%; max-width: 1000px; margin-top: 40px; z-index: 5; }
        .vr-title { font-size: 45px; font-weight: 900; margin-bottom: 5px; text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.6); letter-spacing: -1px; }
        .vr-subtitle { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 25px; font-weight: 300; }

        /* [핵심 교정] 드래그 반응 프레임 레이아웃 */
        .vr-display-frame {
            width: 100%;
            height: 480px;
            background-color: #b3e5fc; /* 이미지 로드 전 하늘색 기본 베이스 제공 */
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 4px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden; /* 영역 밖으로 나가는 큰 이미지 숨김 */
            cursor: grab;
        }
        .vr-display-frame:active { cursor: grabbing; }

        /* 드래그 대상 실제 VR 대형 이미지 */
        #vrImage {
            position: absolute;
            height: 160%; /* 세로 이동폭 확보 */
            width: auto;  /* 가로 파노라마 비율 자동 확장 */
            max-width: none; max-height: none;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none; /* 프레임의 마우스 트래킹을 방해하지 않음 */
        }

        .vr-overlay {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.6); padding: 8px 20px; border-radius: 30px;
            font-size: 13px; backdrop-filter: blur(5px); pointer-events: none; color: #fff; z-index: 2;
        }

        .fab-button {
            position: absolute; bottom: 120px; right: 60px; width: 80px; height: 80px;
            background-color: #ffffff; border-radius: 50%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-decoration: none; color: #000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); z-index: 10; cursor: pointer;
        }

        .scroll-up-guide { position: absolute; top: 100px; color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 300; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="background-container">
        <header>
            <nav>
                <a href="#" onclick="goBackToMain(event)">홈으로</a>
                <a href="vr.html" style="color: #ffeb3b;">명소(VR)</a>
                <a href="#">행사안내</a>
                <a href="#">편의시설</a>
                <a href="#">공지사항</a>
                <a href="#">찾아오시는길</a>
            </nav>
        </header>

        <div class="scroll-up-guide">▲ 휠 스크롤을 위로 올리면 메인 화면으로 돌아갑니다</div>

        <div class="vr-container">
            <h1 class="vr-title">앞산 풍경 VR</h1>
            <div class="vr-subtitle">마우스를 클릭한 채 상하좌우로 드래그하여 전경을 감상해보세요.</div>
            
            <div class="vr-display-frame" id="vrFrame">
                <img src="vr1.jpg" id="vrImage" alt="앞산 VR 풍경">
                <div class="vr-overlay">🔄 마우스 드래그 지원 영역</div>
            </div>
        </div>

        <a href="inquiry.html" class="fab-button">
            <span style="font-size:26px">🎧</span>
            <span style="font-size:12px; font-weight:700">문의하기</span>
        </a>
    </div>

    <script>
        /* 1. 풀페이지 화면 슬라이드 전환 시스템 */
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.style.transition = 'transform 0.7s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.7s ease';
                document.body.style.transform = 'translateY(0)';
                document.body.style.opacity = '1';
            }, 50);
        });

        let isTransitioning = false;
        function goBackToMain(e) {
            if(e) e.preventDefault();
            if (isTransitioning) return;
            isTransitioning = true;
            
            sessionStorage.setItem('fromVR', 'true');
            document.body.style.transform = 'translateY(100vh)';
            document.body.style.opacity = '0';
            
            setTimeout(() => { window.location.href = 'index.html'; }, 700);
        }

        window.addEventListener('wheel', (e) => {
            if (e.deltaY < 0) goBackToMain();
        });

        let startTouchY = 0;
        window.addEventListener('touchstart', (e) => { startTouchY = e.touches[0].pageY; });
        window.addEventListener('touchmove', (e) => {
            if (isTransitioning) return;
            let moveY = e.touches[0].pageY;
            if (moveY - startTouchY > 60) goBackToMain();
        });


        /* 2. [완벽 교정] 고성능 사방 VR 이미지 마우스 드래그 제어 로직 */
        const vrFrame = document.getElementById('vrFrame');
        const vrImage = document.getElementById('vrImage');

        let isDragging = false;
        let startX, startY;
        let imgLeft = 0;
        let imgTop = 0;

        // 프레임 중앙 정렬 계산 함수
        function initImagePosition() {
            imgLeft = (vrFrame.clientWidth - vrImage.clientWidth) / 2;
            imgTop = (vrFrame.clientHeight - vrImage.clientHeight) / 2;
            vrImage.style.left = imgLeft + 'px';
            vrImage.style.top = imgTop + 'px';
        }

        vrImage.addEventListener('load', initImagePosition);
        if (vrImage.complete) initImagePosition();
        window.addEventListener('resize', initImagePosition);

        // 마우스 이벤트 바인딩
        vrFrame.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - imgLeft;
            startY = e.clientY - imgTop;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            imgLeft = e.clientX - startX;
            imgTop = e.clientY - startY;
            
            // 경계선(Boundary) 이탈 방지 처리 (흰 여백 노출 방지)
            const maxLeft = 0;
            const minLeft = vrFrame.clientWidth - vrImage.clientWidth;
            const maxTop = 0;
            const minTop = vrFrame.clientHeight - vrImage.clientHeight;
            
            if (imgLeft > maxLeft) imgLeft = maxLeft;
            if (imgLeft < minLeft) imgLeft = minLeft;
            if (imgTop > maxTop) imgTop = maxTop;
            if (imgTop < minTop) imgTop = minTop;
            
            vrImage.style.left = imgLeft + 'px';
            vrImage.style.top = imgTop + 'px';
        });

        window.addEventListener('mouseup', () => { isDragging = false; });

        // 모바일 터치 드래그 멀티 연동
        vrFrame.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX - imgLeft;
            startY = e.touches[0].clientY - imgTop;
        });

        vrFrame.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault(); // VR 드래그 시 모바일 전체 웹페이지 스크롤 전이 차단
            
            imgLeft = e.touches[0].clientX - startX;
            imgTop = e.touches[0].clientY - startY;
            
            const maxLeft = 0;
            const minLeft = vrFrame.clientWidth - vrImage.clientWidth;
            const maxTop = 0;
            const minTop = vrFrame.clientHeight - vrImage.clientHeight;
            
            if (imgLeft > maxLeft) imgLeft = maxLeft;
            if (imgLeft < minLeft) imgLeft = minLeft;
            if (imgTop > maxTop) imgTop = maxTop;
            if (imgTop < minTop) imgTop = minTop;
            
            vrImage.style.left = imgLeft + 'px';
            vrImage.style.top = imgTop + 'px';
        }, { passive: false });

        window.addEventListener('touchend', () => { isDragging = false; });
    </script>
</body>
</html>
