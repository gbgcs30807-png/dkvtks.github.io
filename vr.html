<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>앞산 풍경 VR</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }

        .background-container {
            width: 100vw; height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('image1.jpg') center/cover no-repeat;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        header {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            padding: 30px 60px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(2px);
        }

        header nav a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 35px;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s;
        }

        header nav a:hover { color: #ddd; }

        /* VR 레이아웃 컨텐츠 박스 */
        .vr-container {
            text-align: center;
            color: #ffffff;
            width: 85%;
            max-width: 1000px;
            margin-top: 40px;
            z-index: 5;
        }

        .vr-title {
            font-size: 45px;
            font-weight: 900;
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.6);
            letter-spacing: -1px;
        }

        /* 요청하신 하늘색 바탕의 VR 프레임 상자 */
        .vr-display-frame {
            width: 100%;
            height: 480px;
            background-color: #b3e5fc; /* 하늘색 바탕색 */
            background: url('vr1.jpg') center/cover no-repeat; /* vr1.jpg 매칭 */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border: 4px solid rgba(255, 255, 255, 0.2);
        }

        .fab-button {
            position: absolute; bottom: 120px; right: 60px; width: 80px; height: 80px;
            background-color: #ffffff; border-radius: 50%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-decoration: none; color: #000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); z-index: 10; cursor: pointer;
        }

        /* 상단으로 다시 돌아가는 안내 텍스트 */
        .scroll-up-guide {
            position: absolute; top: 100px; color: rgba(255,255,255,0.6);
            font-size: 13px; font-weight: 300; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="background-container">
        <header>
            <nav>
                <a href="index.html">홈으로</a>
                <a href="vr.html" style="color: #ffeb3b;">명소(VR)</a>
                <a href="#">행사안내</a>
                <a href="#">편의시설</a>
                <a href="#">공지사항</a>
                <a href="#">찾아오시는길</a>
            </nav>
        </header>

        <div class="scroll-up-guide">▲ 스크롤을 위로 올리면 메인 화면으로 이동합니다</div>

        <div class="vr-container">
            <h1 class="vr-title">앞산 풍경 VR</h1>
            <div class="vr-display-frame"></div>
        </div>

        <a href="inquiry.html" class="fab-button">
            <span style="font-size:26px">🎧</span>
            <span style="font-size:12px; font-weight:700">문의하기</span>
        </a>
    </div>

    <script>
        // 위로 스크롤하면 다시 index.html(메인)로 복귀하는 기능
        window.addEventListener('wheel', function(event) {
            if (event.deltaY < 0) { 
                window.location.href = 'index.html';
            }
        });

        // 모바일 터치 아래로 쓸어내릴 때 복귀
        let startY;
        window.addEventListener('touchstart', function(e) {
            startY = e.touches[0].pageY;
        });
        window.addEventListener('touchmove', function(e) {
            let moveY = e.touches[0].pageY;
            if (moveY - startY > 50) { 
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
