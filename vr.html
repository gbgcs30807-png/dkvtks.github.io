<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>앞산 풍경 VR</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; background-color: #000; }

        /* 진입 시 아래에서 위로 스윽 올라오는 연출 */
        .background-container {
            width: 100vw; height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('image1.jpg') center/cover no-repeat;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: translateY(100vh);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease;
        }

        .background-container.slide-in {
            transform: translateY(0);
            opacity: 1;
        }

        /* 홈으로 복귀할 때 내려가는 애니메이션 */
        .background-container.slide-out-down {
            transform: translateY(100vh);
            opacity: 0;
        }

        header {
            position: absolute; top: 0; right: 0; width: 100%; padding: 30px 60px;
            box-sizing: border-box; display: flex; justify-content: flex-end; z-index: 10;
            background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px);
        }

        header nav a { color: #ffffff; text-decoration: none; margin-left: 35px; font-size: 16px; font-weight: 500; transition: color 0.3s; }
        header nav a:hover { color: #ddd; }

        .vr-container { text-align: center; color: #ffffff; width: 85%; max-width: 1000px; margin-top: 40px; z-index: 5; }
        .vr-title { font-size: 45px; font-weight: 900; margin-bottom: 5px; text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.6); letter-spacing: -1px; }
        
        .vr-subtitle {
            font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 25px; font-weight: 300;
        }

        /* [개선] 마우스 드래그를 조작할 VR 화면 프레임 박스 */
        .vr-display-frame {
            width: 100%;
            height: 480px;
            background-color: #b3e5fc; /* 하늘색 바탕 기본 장착 */
            background-image: url('vr1.jpg');
            background-size: 300% auto; /* 드래그 공간 확보를 위해 가로배율을 대폭 확장 */
            background-position: 50% 50%; /* 정중앙 시작 */
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 4px solid rgba(255, 255, 255, 0.2);
            cursor: grab; /* 잡을 수 있는 손모양 아이콘 */
            user-select: none; /* 드래그 시 텍스트나 이미지가 파랗게 블록지정되는 현상 방지 */
        }

        .vr-display-frame:active {
            cursor: grabbing; /* 드래그 중 꽉 쥔 손모양 */
        }

        .fab-button {
            position: absolute; bottom: 120px; right: 60px; width: 80px; height: 80px;
            background-color: #ffffff; border-radius: 50%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-decoration: none; color: #000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); z-index: 10; cursor: pointer;
        }

        .scroll-up-guide { position: absolute; top: 100px; color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 300; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="background-container" id="vrContainer">
        <header>
            <nav>
                <a href="#" onclick="returnToMain(event)">홈으로</a>
                <a href="vr.html" style="color: #ffeb3b;">명소(VR)</a>
                <a href="#">행사안내</a>
                <a href="#">편의시설</a>
                <a href="#">공지사항</a>
                <a href="#">찾아오시는길</a>
            </nav>
        </header>

        <div class="scroll-up-guide">▲ 스크롤을 위로 올리거나 [홈으로]를 누르면 메인 화면으로 복귀합니다</div>

        <div class="vr-container">
            <h1 class="vr-title">앞산 풍경 VR</h1>
            <div class="vr-subtitle">마우스를 클릭한 채 좌우나 상하로 드래그하여 전경을 둘러보세요.</div>
            <div class="vr-display-frame" id="vrFrame"></div>
        </div>

        <a href="inquiry.html" class="fab-button">
            <span style="font-size:26px">🎧</span>
            <span style="font-size:12px; font-weight:700">문의하기</span>
        </a>
    </div>

    <script>
        const container = document.getElementById('vrContainer');
        const vrFrame = document.getElementById('vrFrame');
        let isTransitioning = false;

        // 1. 페이지 로드 시 스욱 올라오는 애니메이션 적용
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { container.classList.add('slide-in'); }, 50);
        });

        // 2. 메인 페이지 복귀 함수
        function returnToMain(e) {
            if(e) e.preventDefault();
            if (isTransitioning) return;
            isTransitioning = true;
            container.classList.remove('slide-in');
            container.classList.add('slide-out-down');
            setTimeout(() => { window.location.href = 'index.html'; }, 550);
        }

        // 역스크롤 감지 (위로 스크롤하면 복귀)
        window.addEventListener('wheel', function(event) {
            if (event.deltaY < 0) { returnToMain(); }
        });

        // 모바일 터치 복귀
        let startTouchY;
        window.addEventListener('touchstart', function(e) { startTouchY = e.touches[0].pageY; });
        window.addEventListener('touchmove', function(e) {
            let moveY = e.touches[0].pageY;
            if (moveY - startTouchY > 40) { returnToMain(); }
        });


        // 3. [핵심] VR 사진 마우스 / 터치 드래그 움직임 구현 로직
        let isDragging = false;
        let startX, startY;
        let bgX = 50; // 초기 배경 X축 위치 (%)
        let bgY = 50; // 초기 배경 Y축 위치 (%)

        // 마우스 누를 때
        vrFrame.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
        });

        // 마우스 움직일 때 (사방 패닝 회전 연산)
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            // 마우스 움직인 거리 계산
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;

            // 기준점 업데이트
            startX = e.clientX;
            startY = e.clientY;

            // 이미지가 마우스 드래그 방향에 맞게 시점이 회전하도록 수치 조절 (0.15는 민감도 속도)
            bgX -= deltaX * 0.15;
            bgY -= deltaY * 0.15;

            // 화면을 벗어나지 않도록 최소 0% ~ 최대 100% 임계값 고정 처리
            if (bgX < 0) bgX = 0;
            if (bgX > 100) bgX = 100;
            if (bgY < 0) bgY = 0;
            if (bgY > 100) bgY = 100;

            // 실시간 이미지 좌표 반영
            vrFrame.style.backgroundPosition = `${bgX}% ${bgY}%`;
        });

        // 마우스 뗐을 때 드래그 종료
        window.addEventListener('mouseup', () => { isDragging = false; });


        // 모바일 스마트폰/태블릿 터치 드래그 지원 연동
        vrFrame.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - startX;
            const deltaY = e.touches[0].clientY - startY;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;

            bgX -= deltaX * 0.15;
            bgY -= deltaY * 0.15;

            if (bgX < 0) bgX = 0; if (bgX > 100) bgX = 100;
            if (bgY < 0) bgY = 0; if (bgY > 100) bgY = 100;

            vrFrame.style.backgroundPosition = `${bgX}% ${bgY}%`;
        });
        window.addEventListener('touchend', () => { isDragging = false; });
    </script>
</body>
</html>
